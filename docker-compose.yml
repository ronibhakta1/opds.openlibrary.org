services:
  opds:
    build:
      context: ../
      dockerfile: opds.openlibrary.org/docker/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
